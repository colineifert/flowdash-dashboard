<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flowdash Ticket Dashboard</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;background:#f7f7f5;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column}
    /* HEADER */
    .header{background:#fff;border-bottom:1px solid #e5e5e3;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:50}
    .header-left{display:flex;align-items:center;gap:12px}
    .logo{font-size:18px;font-weight:700;color:#0d1f1c;letter-spacing:-.3px}
    .logo span{color:#0d1f1c;opacity:.4;margin:0 8px}
    .page-title{font-size:15px;font-weight:600;color:#1a1a1a}
    .btn-export{background:#0d2b25;color:#fff;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:600;letter-spacing:-.1px;transition:opacity .15s}
    .btn-export:hover{opacity:.85}
    /* TABS */
    .tabs-bar{background:#fff;border-bottom:1px solid #e5e5e3;padding:0 32px;display:flex;gap:0;overflow-x:auto}
    .tab{padding:14px 18px;cursor:pointer;font-size:13px;font-weight:500;color:#6b7280;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap;transition:all .15s}
    .tab:hover{color:#1a1a1a}
    .tab.active{color:#3b5bdb;border-bottom:2px solid #3b5bdb;font-weight:600}
    .tab .badge{display:inline-block;background:#f0f0ee;color:#6b7280;border-radius:10px;font-size:11px;padding:1px 7px;margin-left:6px;font-weight:500}
    .tab.active .badge{background:#eef2ff;color:#3b5bdb}
    /* CONTENT */
    .content{padding:28px 32px;flex:1}
    .notice{background:#fff;border:1px solid #e5e5e3;border-radius:8px;padding:12px 16px;margin-bottom:20px;color:#6b7280;font-size:12px;display:flex;align-items:center;gap:8px}
    /* SUMMARY STATS */
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
    .stat-card{background:#fff;border:1px solid #e5e5e3;border-radius:10px;padding:20px 24px}
    .stat-num{font-size:32px;font-weight:700;color:#1a1a1a;letter-spacing:-1px;line-height:1}
    .stat-label{font-size:12px;color:#9ca3af;margin-top:4px;text-transform:uppercase;letter-spacing:.06em;font-weight:500}
    /* CARDS */
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
    .card{background:#fff;border:1px solid #e5e5e3;border-radius:10px;padding:20px 24px}
    .card-title{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:16px;text-transform:uppercase;letter-spacing:.05em}
    /* BAR CHART */
    .bar-row{margin-bottom:12px}
    .bar-label{display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px;color:#374151}
    .bar-count{font-weight:600;color:#0d2b25}
    .bar-bg{height:6px;border-radius:3px;background:#f0f0ee;overflow:hidden}
    .bar-fill{height:100%;border-radius:3px;background:#0d2b25;transition:width .5s}
    /* STATUS */
    .status-grid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
    .status-box{background:#f7f7f5;border:1px solid #e5e5e3;border-radius:8px;padding:12px 16px;min-width:100px;text-align:center}
    .status-num{font-size:22px;font-weight:700;color:#1a1a1a}
    .status-lbl{font-size:11px;color:#9ca3af;margin-top:3px;font-weight:500}
    /* RECENT */
    .recent-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0ee}
    .recent-row:last-child{border-bottom:none}
    .recent-title{font-size:12px;color:#374151;max-width:65%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .recent-title a{color:#3b5bdb;text-decoration:none}
    .recent-title a:hover{text-decoration:underline}
    /* TABLE */
    .table-wrap{background:#fff;border:1px solid #e5e5e3;border-radius:10px;overflow:hidden}
    .filter-row{display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
    .filter-label{font-size:12px;color:#9ca3af;font-weight:500}
    select{background:#fff;border:1px solid #e5e5e3;border-radius:6px;color:#374151;padding:7px 12px;font-size:13px;cursor:pointer;outline:none}
    select:focus{border-color:#3b5bdb}
    .count-lbl{font-size:12px;color:#9ca3af;margin-left:auto}
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead{background:#f7f7f5}
    th{padding:10px 16px;text-align:left;color:#9ca3af;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid #e5e5e3;cursor:pointer;user-select:none;white-space:nowrap}
    th:hover{color:#374151}
    td{padding:12px 16px;border-bottom:1px solid #f0f0ee;vertical-align:middle;color:#374151}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#f7f7f5}
    .pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
    .badge-status{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
    .link{color:#3b5bdb;text-decoration:none;font-size:12px;font-weight:500}
    .link:hover{text-decoration:underline}
    /* MODAL */
    .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:100;display:none;align-items:center;justify-content:center;padding:24px}
    .modal{background:#fff;border-radius:12px;border:1px solid #e5e5e3;padding:24px;width:100%;max-width:680px;max-height:80vh;display:flex;flex-direction:column;gap:14px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
    .modal-header{display:flex;justify-content:space-between;align-items:center}
    .modal-title{font-weight:700;font-size:15px;color:#1a1a1a}
    .modal-close{background:none;border:none;color:#9ca3af;font-size:20px;cursor:pointer;line-height:1}
    .modal-hint{font-size:12px;color:#f59e0b;background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:8px 12px}
    textarea{flex:1;min-height:280px;background:#f7f7f5;border:1px solid #e5e5e3;border-radius:8px;color:#374151;font-size:11px;font-family:monospace;padding:12px;resize:vertical;cursor:pointer;width:100%;outline:none}
    .select-btn{background:#0d2b25;color:#fff;border:none;border-radius:6px;padding:10px 20px;cursor:pointer;font-size:13px;font-weight:600}
    @media(max-width:640px){.stats-row{grid-template-columns:1fr}.grid2{grid-template-columns:1fr}.content{padding:20px 16px}.tabs-bar{padding:0 16px}.header{padding:0 16px}}
  </style>
</head>

// Status colours (light theme)
const SC = {active:"#16a34a",completed:"#3b5bdb",closed:"#6b7280","in progress":"#d97706",open:"#2563eb","under review":"#7c3aed",pending:"#ea580c",new:"#0891b2"};
function sColor(s){const sl=(s||"").toLowerCase();for(const[k,v]of Object.entries(SC))if(sl.includes(k))return v;return "#6b7280";}

// All unique types, sorted
const ALL_TYPES = [...new Set(TICKETS.map(t=>t.type))].sort();
let currentTab = "Summary";
let sortField = "type", sortDir = "asc";

function buildTabs(){
  const bar = document.getElementById("tabs-bar");
  bar.innerHTML = "";
  // Summary tab
  const s = document.createElement("button");
  s.className = "tab" + (currentTab==="Summary"?" active":"");
  s.textContent = "Summary";
  s.onclick = ()=>switchTab("Summary");
  bar.appendChild(s);
  // All Tickets tab
  const a = document.createElement("button");
  a.className = "tab" + (currentTab==="All"?" active":"");
  a.innerHTML = `All Tickets <span class="badge">${TICKETS.length}</span>`;
  a.onclick = ()=>switchTab("All");
  bar.appendChild(a);
  // Per-type tabs
  ALL_TYPES.forEach(type=>{
    const count = TICKETS.filter(t=>t.type===type).length;
    const btn = document.createElement("button");
    btn.className = "tab" + (currentTab===type?" active":"");
    btn.innerHTML = `${type} <span class="badge">${count}</span>`;
    btn.onclick = ()=>switchTab(type);
    bar.appendChild(btn);
  });
}

function switchTab(tab){
  currentTab = tab;
  buildTabs();
  renderContent();
}

function renderContent(){
  const el = document.getElementById("tab-content");
  if(currentTab==="Summary") { el.innerHTML = buildSummary(); return; }
  const tickets = currentTab==="All" ? TICKETS : TICKETS.filter(t=>t.type===currentTab);
  el.innerHTML = buildTicketTable(tickets);
}

function buildSummary(){
  const total = TICKETS.length;
  const open = TICKETS.filter(t=>["active","open","progress","new","pending"].some(k=>(t.status||"").toLowerCase().includes(k))).length;
  const closed = TICKETS.filter(t=>["complet","closed","done"].some(k=>(t.status||"").toLowerCase().includes(k))).length;

  const typeStats={}, statusStats={};
  TICKETS.forEach(t=>{typeStats[t.type]=(typeStats[t.type]||0)+1; statusStats[t.status]=(statusStats[t.status]||0)+1;});
  const maxCount = Math.max(...Object.values(typeStats));
  const typeEntries = Object.entries(typeStats).sort((a,b)=>b[1]-a[1]);
  const statusEntries = Object.entries(statusStats).sort((a,b)=>b[1]-a[1]);

  const bars = typeEntries.map(([type,count])=>`
    <div class="bar-row">
      <div class="bar-label"><span>${type}</span><span class="bar-count">${count}</span></div>
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(count/maxCount*100)}%"></div></div>
    </div>`).join("");

  const boxes = statusEntries.map(([s,c])=>`
    <div class="status-box">
      <div class="status-num" style="color:${sColor(s)}">${c}</div>
      <div class="status-lbl">${s}</div>
    </div>`).join("");

  const recent = TICKETS.slice(0,5).map(t=>`
    <div class="recent-row">
      <div class="recent-title"><a href="${t.url}" target="_blank">${t.title}</a></div>
      <span class="badge-status" style="background:${sColor(t.status)}18;color:${sColor(t.status)}">${t.status}</span>
    </div>`).join("");

  return `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Total Tickets</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#16a34a">${open}</div><div class="stat-label">Open / Active</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#3b5bdb">${closed}</div><div class="stat-label">Completed / Closed</div></div>
    </div>
    <div class="grid2">
      <div class="card"><div class="card-title">By Type</div>${bars}</div>
      <div class="card">
        <div class="card-title">By Status</div>
        <div class="status-grid">${boxes}</div>
        <div class="card-title" style="margin-top:8px">Recent Tickets</div>
        ${recent}
      </div>
    </div>`;
}

function buildTicketTable(tickets){
  const sorted = [...tickets].sort((a,b)=>{
    const av=a[sortField]||"", bv=b[sortField]||"";
    return sortDir==="asc"?av.localeCompare(bv):bv.localeCompare(av);
  });
  const rows = sorted.map(t=>`
    <tr>
      <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${t.title}">${t.title}</td>
      <td><span class="pill" style="background:#f0f0ee;color:#374151">${t.type}</span></td>
      <td><span class="badge-status" style="background:${sColor(t.status)}18;color:${sColor(t.status)}">${t.status}</span></td>
      <td style="color:#9ca3af;font-size:12px">${t.dateCreated}</td>
      <td><a class="link" href="${t.url}" target="_blank">Open ↗</a></td>
    </tr>`).join("");

  const arw = f => sortField===f ? (sortDir==="asc"?" ↑":" ↓") : "";

  return `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="sort('title')">Ticket Title${arw('title')}</th>
            <th onclick="sort('type')">Type${arw('type')}</th>
            <th onclick="sort('status')">Status${arw('status')}</th>
            <th onclick="sort('dateCreated')">Date Created${arw('dateCreated')}</th>
            <th>Link</th>
          </tr>
        </thead>
        <tbody>${rows||'<tr><td colspan="5" style="text-align:center;padding:32px;color:#9ca3af">No tickets found.</td></tr>'}</tbody>
      </table>
    </div>
    <div style="font-size:12px;color:#9ca3af;margin-top:10px">${tickets.length} ticket${tickets.length!==1?"s":""}</div>`;
}

function sort(field){
  if(sortField===field) sortDir = sortDir==="asc"?"desc":"asc";
  else{sortField=field;sortDir="asc";}
  renderContent();
}

function openExport(){
  const typeStats={},statusStats={};
  TICKETS.forEach(t=>{typeStats[t.type]=(typeStats[t.type]||0)+1;statusStats[t.status]=(statusStats[t.status]||0)+1;});
  const te=Object.entries(typeStats),se=Object.entries(statusStats);
  let out=`TICKET SUMMARY\tGenerated: ${new Date().toLocaleString()}\n\nBY TYPE\tCount\t\tBY STATUS\tCount\n`;
  for(let i=0;i<Math.max(te.length,se.length);i++){const[tk,tv]=te[i]||["",""];const[sk,sv]=se[i]||["",""];out+=`${tk}\t${tv}\t\t${sk}\t${sv}\n`;}
  out+=`\nTOTAL TICKETS\t${TICKETS.length}\n\nTicket Title\tType\tStatus\tDate Created\tTicket Link\n`;
  [...TICKETS].sort((a,b)=>a.type.localeCompare(b.type)||a.title.localeCompare(b.title)).forEach(t=>{
    out+=`${t.title}\t${t.type}\t${t.status}\t${t.dateCreated}\t${t.url}\n`;
  });
  document.getElementById("export-text").value=out;
  document.getElementById("export-modal").style.display="flex";
}
function closeExport(){document.getElementById("export-modal").style.display="none";}

window.onload=()=>{buildTabs();renderContent();};
</script>
</body>
</html>
