<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flowdash Ticket Dashboard</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;background:#f7f7f5;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column}
    .header{background:#0d2b25;border-bottom:1px solid #0a2020;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:50}
    .logo{font-size:17px;font-weight:700;color:#fff;letter-spacing:-.3px}
    .logo span{color:#fff;opacity:.35;margin:0 10px}
    .btn-export{background:#fff;color:#0d2b25;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:700;transition:opacity .15s}
    .btn-export:hover{opacity:.85}
    .tabs-bar{background:#fff;border-bottom:1px solid #e5e5e3;padding:0 32px;display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
    .tabs-bar::-webkit-scrollbar{display:none}
    .tab{padding:14px 16px;cursor:pointer;font-size:13px;font-weight:500;color:#6b7280;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap;transition:all .15s}
    .tab:hover{color:#1a1a1a}
    .tab.active{color:#3b5bdb;border-bottom:2px solid #3b5bdb;font-weight:600}
    .badge{display:inline-block;background:#f0f0ee;color:#6b7280;border-radius:10px;font-size:11px;padding:1px 7px;margin-left:5px;font-weight:500}
    .tab.active .badge{background:#eef2ff;color:#3b5bdb}
    .content{padding:28px 32px;flex:1}
    .notice{background:#fff;border:1px solid #e5e5e3;border-radius:8px;padding:11px 16px;margin-bottom:20px;color:#9ca3af;font-size:12px}
    /* SUMMARY */
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
    .stat-card{background:#fff;border:1px solid #e5e5e3;border-radius:10px;padding:20px 24px}
    .stat-num{font-size:32px;font-weight:700;letter-spacing:-1px;line-height:1}
    .stat-label{font-size:12px;color:#9ca3af;margin-top:4px;text-transform:uppercase;letter-spacing:.06em;font-weight:500}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
    .card{background:#fff;border:1px solid #e5e5e3;border-radius:10px;padding:20px 24px}
    .card-title{font-size:11px;font-weight:600;color:#9ca3af;margin-bottom:14px;text-transform:uppercase;letter-spacing:.07em}
    .bar-row{margin-bottom:11px}
    .bar-label{display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px;color:#374151}
    .bar-count{font-weight:600;color:#0d2b25}
    .bar-bg{height:5px;border-radius:3px;background:#f0f0ee;overflow:hidden}
    .bar-fill{height:100%;border-radius:3px;background:#1a5c45}
    .status-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
    .status-box{background:#f7f7f5;border:1px solid #e5e5e3;border-radius:8px;padding:10px 14px;min-width:90px;text-align:center}
    .status-num{font-size:20px;font-weight:700}
    .status-lbl{font-size:11px;color:#9ca3af;margin-top:2px}
    .recent-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0ee}
    .recent-row:last-child{border-bottom:none}
    .recent-name{font-size:12px;color:#374151;max-width:64%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .recent-name a{color:#3b5bdb;text-decoration:none}
    .recent-name a:hover{text-decoration:underline}
    /* TICKET CARDS */
    .section-label{font-size:11px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;margin-top:4px}
    .ticket-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:8px}
    .ticket-card{background:#fff;border:1px solid #e5e5e3;border-radius:10px;padding:16px 20px;transition:box-shadow .15s}
    .ticket-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.07)}
    .ticket-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:8px}
    .ticket-title{font-size:14px;font-weight:600;color:#1a1a1a;line-height:1.4}
    .ticket-title a{color:#1a1a1a;text-decoration:none}
    .ticket-title a:hover{color:#3b5bdb}
    .ticket-meta{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .status-pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
    .ticket-desc{font-size:12px;color:#6b7280;line-height:1.6;margin-top:6px;padding-top:8px;border-top:1px solid #f0f0ee}
    .ticket-footer{display:flex;align-items:center;gap:16px;margin-top:10px;padding-top:8px;border-top:1px solid #f0f0ee;font-size:11px;color:#9ca3af}
    .ticket-footer a{color:#3b5bdb;text-decoration:none;font-weight:500}
    .ticket-footer a:hover{text-decoration:underline}
    /* COMPLETED TOGGLE */
    .completed-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;padding:10px 0;margin-top:8px;font-size:13px;font-weight:600;color:#6b7280;user-select:none;border-top:1px solid #e5e5e3}
    .completed-toggle:hover{color:#374151}
    .toggle-arrow{font-size:11px;transition:transform .2s}
    .toggle-arrow.open{transform:rotate(90deg)}
    .completed-section{display:none;margin-top:10px}
    .completed-section.open{display:block}
    /* EXPORT MODAL */
    .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.35);z-index:100;display:none;align-items:center;justify-content:center;padding:24px}
    .modal{background:#fff;border-radius:12px;border:1px solid #e5e5e3;padding:24px;width:100%;max-width:680px;max-height:80vh;display:flex;flex-direction:column;gap:14px;box-shadow:0 20px 60px rgba(0,0,0,.12)}
    .modal-header{display:flex;justify-content:space-between;align-items:center}
    .modal-title{font-weight:700;font-size:15px;color:#1a1a1a}
    .modal-close{background:none;border:none;color:#9ca3af;font-size:20px;cursor:pointer}
    .modal-hint{font-size:12px;color:#92400e;background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:8px 12px}
    textarea{flex:1;min-height:260px;background:#f7f7f5;border:1px solid #e5e5e3;border-radius:8px;color:#374151;font-size:11px;font-family:monospace;padding:12px;resize:vertical;cursor:pointer;width:100%}
    .select-btn{background:#0d2b25;color:#fff;border:none;border-radius:6px;padding:10px 20px;cursor:pointer;font-size:13px;font-weight:600}
    @media(max-width:640px){.stats-row,.grid2{grid-template-columns:1fr}.content{padding:20px 16px}.tabs-bar,.header{padding-left:16px;padding-right:16px}}
  </style>
</head>

</div>

  {taskId:"ArsJjN7r",type:"Other",status:"Demat Good to Go",dateCreated:"Unknown",title:"Demat Account Task",desc:"Demat account check for deployment. Fund already has demat account of the correct type — no additional action required.",url:"https://flowdash.internal.angellist.com/workflows/rkI5X9/tasks/ArsJjN7r"},
];

// Statuses that count as "done/completed" for the toggle
const DONE_STATUSES = ["complete","complete w/ gratitude","closed","done","cancelled","archived","launched","paid","recording complete","approved","demat good to go","al approved"];
function isDone(s){ return DONE_STATUSES.some(k=>(s||"").toLowerCase().includes(k)); }

const SC = {
  "not started":"#6b7280","waiting for submitter":"#d97706","in progress":"#2563eb",
  "pending signatures":"#7c3aed","complete":"#16a34a","complete w/ gratitude":"#16a34a",
  "ready to launch":"#0891b2","archived":"#6b7280","launched":"#16a34a",
  "done":"#16a34a","cancelled":"#6b7280","pending":"#d97706","al approved":"#16a34a",
  "pending cr action":"#d97706","needs follow up":"#d97706","paid":"#16a34a",
  "recording complete":"#16a34a","new fund added":"#2563eb","gp contacted":"#0891b2",
  "approved":"#16a34a","demat good to go":"#16a34a",
};
function sColor(s){
  const sl=(s||"").toLowerCase();
  for(const[k,v] of Object.entries(SC)) if(sl.includes(k)) return v;
  return "#6b7280";
}

function stripHtml(h){ const d=document.createElement("div"); d.innerHTML=h; return d.textContent||d.innerText||""; }

const ALL_TYPES = [...new Set(TICKETS.map(t=>t.type))].sort();
let currentTab = "Summary";

function buildTabs(){
  const bar = document.getElementById("tabs-bar");
  bar.innerHTML = "";
  const tabs = [
    {id:"Summary", label:"Summary", count:null},
    {id:"All", label:"All Tickets", count:TICKETS.length},
    ...ALL_TYPES.map(type=>({id:type, label:type, count:TICKETS.filter(t=>t.type===type).length}))
  ];
  tabs.forEach(({id,label,count})=>{
    const btn = document.createElement("button");
    btn.className = "tab" + (currentTab===id?" active":"");
    btn.innerHTML = label + (count!==null ? `<span class="badge">${count}</span>` : "");
    btn.onclick = ()=>switchTab(id);
    bar.appendChild(btn);
  });
}

function switchTab(tab){ currentTab=tab; buildTabs(); renderContent(); }

function renderContent(){
  const el = document.getElementById("tab-content");
  if(currentTab==="Summary"){ el.innerHTML=buildSummary(); return; }
  const tickets = currentTab==="All" ? TICKETS : TICKETS.filter(t=>t.type===currentTab);
  el.innerHTML = buildTicketView(tickets, currentTab);
}

function buildTicketView(tickets, label){
  const active = tickets.filter(t=>!isDone(t.status));
  const done = tickets.filter(t=>isDone(t.status));
  let html = "";
  if(active.length===0 && done.length===0){
    html += `<div style="text-align:center;padding:40px;color:#9ca3af;font-size:13px">No tickets found.</div>`;
  }
  if(active.length>0){
    html += `<div class="section-label">${active.length} Active Ticket${active.length!==1?"s":""}</div>`;
    html += `<div class="ticket-grid">${active.map(ticketCard).join("")}</div>`;
  }
  if(done.length>0){
    const toggleId = "completed-"+label.replace(/\s+/g,"-");
    html += `
      <div class="completed-toggle" onclick="toggleCompleted('${toggleId}')">
        <span class="toggle-arrow" id="arrow-${toggleId}">▶</span>
        Completed &amp; Closed
        <span class="badge" style="background:#f0f0ee;color:#6b7280;margin-left:4px">${done.length}</span>
      </div>
      <div class="completed-section" id="${toggleId}">
        <div class="ticket-grid">${done.map(ticketCard).join("")}</div>
      </div>`;
  }
  return html;
}

function ticketCard(t){
  const color = sColor(t.status);
  return `
    <div class="ticket-card">
      <div class="ticket-top">
        <div class="ticket-title"><a href="${t.url}" target="_blank">${t.title}</a></div>
        <div class="ticket-meta">
          <span class="status-pill" style="background:${color}18;color:${color}">${t.status}</span>
        </div>
      </div>
      <div class="ticket-desc">${t.desc}</div>
      <div class="ticket-footer">
        <span>📁 ${t.type}</span>
        ${t.dateCreated!=="Unknown"?`<span>📅 ${t.dateCreated}</span>`:""}
        <a href="${t.url}" target="_blank">Open in Flowdash ↗</a>
      </div>
    </div>`;
}

function toggleCompleted(id){
  const sec = document.getElementById(id);
  const arrow = document.getElementById("arrow-"+id);
  sec.classList.toggle("open");
  arrow.classList.toggle("open");
}

function buildSummary(){
  const total=TICKETS.length;
  const open=TICKETS.filter(t=>!isDone(t.status)).length;
  const closed=TICKETS.filter(t=>isDone(t.status)).length;
  const typeStats={}, statusStats={};
  TICKETS.forEach(t=>{typeStats[t.type]=(typeStats[t.type]||0)+1; statusStats[t.status]=(statusStats[t.status]||0)+1;});
  const maxCount=Math.max(...Object.values(typeStats));
  const bars=Object.entries(typeStats).sort((a,b)=>b[1]-a[1]).map(([type,count])=>`
    <div class="bar-row">
      <div class="bar-label"><span>${type}</span><span class="bar-count">${count}</span></div>
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(count/maxCount*100)}%"></div></div>
    </div>`).join("");
  const boxes=Object.entries(statusStats).sort((a,b)=>b[1]-a[1]).map(([s,c])=>`
    <div class="status-box">
      <div class="status-num" style="color:${sColor(s)}">${c}</div>
      <div class="status-lbl">${s}</div>
    </div>`).join("");
  const recent=TICKETS.filter(t=>!isDone(t.status)).slice(0,5).map(t=>`
    <div class="recent-row">
      <div class="recent-name"><a href="${t.url}" target="_blank">${t.title}</a></div>
      <span class="status-pill" style="background:${sColor(t.status)}18;color:${sColor(t.status)}">${t.status}</span>
    </div>`).join("");
  return `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Total Tickets</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#2563eb">${open}</div><div class="stat-label">Open / Active</div></div>
      <div class="stat-card"><div class="stat-num" style="color:#16a34a">${closed}</div><div class="stat-label">Completed / Closed</div></div>
    </div>
    <div class="grid2">
      <div class="card"><div class="card-title">By Type</div>${bars}</div>
      <div class="card">
        <div class="card-title">Active Tickets</div>
        ${recent||'<div style="font-size:12px;color:#9ca3af">No active tickets.</div>'}
      </div>
    </div>`;
}

function openExport(){
  const typeStats={},statusStats={};
  TICKETS.forEach(t=>{typeStats[t.type]=(typeStats[t.type]||0)+1;statusStats[t.status]=(statusStats[t.status]||0)+1;});
  const te=Object.entries(typeStats),se=Object.entries(statusStats);
  let out=`TICKET SUMMARY\tGenerated: ${new Date().toLocaleString()}\n\nBY TYPE\tCount\t\tBY STATUS\tCount\n`;
  for(let i=0;i<Math.max(te.length,se.length);i++){const[tk,tv]=te[i]||["",""];const[sk,sv]=se[i]||["",""];out+=`${tk}\t${tv}\t\t${sk}\t${sv}\n`;}
  out+=`\nTOTAL TICKETS\t${TICKETS.length}\n\nTicket Title\tType\tStatus\tDate Created\tDescription\tTicket Link\n`;
  [...TICKETS].sort((a,b)=>a.type.localeCompare(b.type)||a.title.localeCompare(b.title)).forEach(t=>{
    out+=`${t.title}\t${t.type}\t${t.status}\t${t.dateCreated}\t${t.desc}\t${t.url}\n`;
  });
  document.getElementById("export-text").value=out;
  document.getElementById("export-modal").style.display="flex";
}
function closeExport(){document.getElementById("export-modal").style.display="none";}

window.onload=()=>{buildTabs();renderContent();};
</script>
</body>
</html>
